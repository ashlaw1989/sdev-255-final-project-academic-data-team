<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register New User</title>
    <script src="../src/registration.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="heading">New User Registration</h1>
    <form>
        <div>
            <label for="username">Username:</label>
            <input type="text" id="username" autocomplete="username" placeholder="Username">
        </div>
        <div>
            <label for="password">Password:</label>
            <input type="password" id="password" placeholder="Password">
        </div>
        <div>
            <label for="role">Role:</label>
            <select name="role" id="role">
                <option value="student">Student</option>
                <option value="teacher">Teacher</option>
            </select>
        </div>
        <div id="buttonDiv">
            <input type="button" id="registerBtn" value="Register">
        </div>
        <p id="error"></p>
    </form>
    <p id="redirect">Already have an account? <a href="login.html">Click Here to Login</a></p>
</body>
</html>
